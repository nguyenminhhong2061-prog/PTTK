# =====================================================
# Nginx API Gateway Configuration
# Routing: Frontend/Client → Gateway → Backend Services
# =====================================================

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Upstream Services ─────────────────────────────
    upstream exam_service {
        server exam-service:8080;
    }
    upstream submission_service {
        server submission-service:8080;
    }
    upstream statistics_service {
        server statistics-service:8080;
    }

    server {
        listen 80;

        # ── CORS Headers ─────────────────────────────
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        # Preflight OPTIONS request
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Route: /api/questions → Exam Service ─────
        location /api/questions/ {
            proxy_pass         http://exam_service/questions/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Route: /api/exams → Exam Service ─────────
        location /api/exams/ {
            proxy_pass         http://exam_service/exams/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Route: /api/submissions → Submission Svc ─
        location /api/submissions/ {
            proxy_pass         http://submission_service/submissions/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;  # Dài hơn vì có thể xử lý chấm điểm
        }

        # ── Route: /api/statistics → Statistics Svc ──
        location /api/statistics/ {
            proxy_pass         http://statistics_service/statistics/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Health Check Gateway ──────────────────────
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── 404 fallback ──────────────────────────────
        location / {
            return 404 '{"error":"NOT_FOUND","message":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
