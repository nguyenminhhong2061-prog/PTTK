# =====================================================
# Nginx API Gateway Configuration
# Routing: Frontend/Client -> Gateway -> Backend Services
# =====================================================

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    upstream exam_service {
        server exam-service:8080;
    }
    upstream submission_service {
        server submission-service:8080;
    }

    server {
        listen 80;

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /api/questions/ {
            proxy_pass         http://exam_service/questions/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /api/exams/ {
            proxy_pass         http://exam_service/exams/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /api/submissions/ {
            proxy_pass         http://submission_service/submissions/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/statistics/ {
            return 503 '{"error":"SERVICE_UNAVAILABLE","message":"Statistics Service chua trien khai"}';
            add_header Content-Type application/json;
        }

        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"NOT_FOUND","message":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
