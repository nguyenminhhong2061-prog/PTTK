# =====================================================
# Submission Service — Application Configuration
# =====================================================

server.port=8080

# ── MySQL Datasource ──────────────────────────────────
# Biến môi trường được inject từ docker-compose.yml
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:submission_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# update: tự tạo/cập nhật bảng theo Entity (dùng cho dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Actuator ─────────────────────────────────────────
# Expose circuit breaker state để monitor và demo
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,circuitbreakers,retries,metrics
management.health.circuitbreakers.enabled=true

# ── External Services ─────────────────────────────────
# URL của Exam Service (ghi đè bằng biến môi trường trong Docker)
exam.service.url=${EXAM_SERVICE_URL:http://localhost:5001}

# ── Logging ───────────────────────────────────────────
logging.level.com.quizapp=INFO
logging.level.org.springframework.web=WARN
# Log Circuit Breaker state change để dễ debug/demo
logging.level.io.github.resilience4j=INFO

# ── Jackson Date/Time ─────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ══════════════════════════════════════════════════════
# TV2 — Resilience4j Configuration
# Pattern: Circuit Breaker + Retry cho ExamServiceClient
# ══════════════════════════════════════════════════════

# ── Circuit Breaker: examService ─────────────────────
# Đếm theo số lần gọi gần nhất (COUNT_BASED, cửa sổ 10 request)
resilience4j.circuitbreaker.instances.examService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.examService.sliding-window-size=10
# Ngưỡng: 50% lỗi trong cửa sổ → OPEN circuit
resilience4j.circuitbreaker.instances.examService.failure-rate-threshold=50
# Phải có ít nhất 5 lần gọi thì mới bắt đầu tính tỷ lệ lỗi
resilience4j.circuitbreaker.instances.examService.minimum-number-of-calls=5
# Chờ 30 giây ở trạng thái OPEN trước khi thử lại (HALF-OPEN)
resilience4j.circuitbreaker.instances.examService.wait-duration-in-open-state=30s
# HALF-OPEN: cho qua 3 request thử nghiệm để quyết định CLOSED hay OPEN lại
resilience4j.circuitbreaker.instances.examService.permitted-number-of-calls-in-half-open-state=3
# Tự động chuyển sang HALF-OPEN sau 30s (không cần trigger thủ công)
resilience4j.circuitbreaker.instances.examService.automatic-transition-from-open-to-half-open-enabled=true
# Ghi nhận exception loại nào là "lỗi" để tính tỷ lệ
# Bao gồm mọi Exception — kể cả timeout, connection refused, 5xx
resilience4j.circuitbreaker.instances.examService.record-exceptions=java.lang.Exception
# KHÔNG tính lỗi 4xx HTTP (404 đề thi không tồn tại, 400 bad request) vào tỷ lệ lỗi.
# Đây là lỗi nghiệp vụ cố định — không phải lỗi hạ tầng, không nên kích hoạt Circuit OPEN.
# QUAN TRỌNG: Chỉ ignore các lớp con 4xx cụ thể, KHÔNG dùng lớp cha WebClientResponseException
# vì lớp cha bao phủ cả 5xx — khiến lỗi server (500, 503) cũng bị bỏ qua, Circuit không bao giờ OPEN.
resilience4j.circuitbreaker.instances.examService.ignore-exceptions=\
  org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest,\
  org.springframework.web.reactive.function.client.WebClientResponseException.NotFound,\
  org.springframework.web.reactive.function.client.WebClientResponseException.Forbidden,\
  org.springframework.web.reactive.function.client.WebClientResponseException.Unauthorized

# ── Slow Call Detection (QUAN TRỌNG — giải quyết Vấn Đề 2 trong PROJECT_OVERVIEW) ──
# PROJECT_OVERVIEW mô tả kịch bản: "Exam Service chậm (không down hẳn) → giữ thread → thread pool cạn"
# Nếu chỉ config failure-rate-threshold, Circuit Breaker CHỈ phát hiện exception (Exam down hoàn toàn).
# Kịch bản nguy hiểm hơn — Exam Service chậm (timeout 5s) nhưng vẫn trả response — sẽ không bị phát hiện.
# Slow call config giải quyết đúng kịch bản đó:
# → Nếu response mất hơn 4s = "slow call" (WebClient timeout là 5s, buffer 1s)
resilience4j.circuitbreaker.instances.examService.slow-call-duration-threshold=4s
# → 50% slow call trong cửa sổ (đồng ngưỡng với failure-rate-threshold) → OPEN circuit
resilience4j.circuitbreaker.instances.examService.slow-call-rate-threshold=50

# ── Retry: examService ────────────────────────────────
# max-attempts=2 nghĩa là: 1 lần gọi đầu + 1 lần retry = tổng 2 lần.
# Lý do chọn 2 thay vì 3:
#   Với timeout 5s/lần: max-attempts=3 → worst case 5+1+5+2+5 = 18s chiếm 1 thread
#   Với max-attempts=2 → worst case 5+1+5 = 11s — giảm rủi ro thread pool exhaustion
resilience4j.retry.instances.examService.max-attempts=2
# Chờ 1 giây giữa các lần retry
resilience4j.retry.instances.examService.wait-duration=1s
# Exponential backoff: lần retry 1 chờ 1s, lần retry 2 chờ 2s (nhân đôi mỗi lần)
resilience4j.retry.instances.examService.enable-exponential-backoff=true
resilience4j.retry.instances.examService.exponential-backoff-multiplier=2
# Retry cho tất cả Exception (connection refused, timeout, 5xx)
resilience4j.retry.instances.examService.retry-exceptions=java.lang.Exception
# KHÔNG retry khi:
#   (1) Circuit đã OPEN — gọi tiếp vô nghĩa, chỉ tốn time
#   (2) Lỗi 4xx HTTP — lỗi nghiệp vụ cố định (404 đề thi không tồn tại), retry ko đổi được gì
# QUAN TRỌNG: Chỉ ignore 4xx cụ thể, KHÔNG ignore toàn bộ WebClientResponseException
# để đảm bảo lỗi 5xx (500, 503) vẫn bị retry.
resilience4j.retry.instances.examService.ignore-exceptions=\
  io.github.resilience4j.circuitbreaker.CallNotPermittedException,\
  org.springframework.web.reactive.function.client.WebClientResponseException.BadRequest,\
  org.springframework.web.reactive.function.client.WebClientResponseException.NotFound,\
  org.springframework.web.reactive.function.client.WebClientResponseException.Forbidden,\
  org.springframework.web.reactive.function.client.WebClientResponseException.Unauthorized

