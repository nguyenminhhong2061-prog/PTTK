# =====================================================
# Submission Service — Application Configuration
# =====================================================

server.port=8080

# ── MySQL Datasource ──────────────────────────────────
# Biến môi trường được inject từ docker-compose.yml
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:submission_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# update: tự tạo/cập nhật bảng theo Entity (dùng cho dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Actuator (Health Check) ───────────────────────────
# Map /actuator/health thành /health
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health

# ── External Services ─────────────────────────────────
# URL của Exam Service (ghi đè bằng biến môi trường trong Docker)
exam.service.url=${EXAM_SERVICE_URL:http://localhost:5001}

# ── Logging ───────────────────────────────────────────
logging.level.com.quizapp=INFO
logging.level.org.springframework.web=WARN
