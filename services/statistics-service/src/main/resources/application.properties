server.port=8080

# URL Submission Service (inject từ docker-compose environment)
submission.service.url=${SUBMISSION_SERVICE_URL:http://submission-service:8080}

# Actuator — map /health
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,retries,metrics

# Logging
logging.level.com.quizapp=INFO
logging.level.org.springframework.web=WARN
# Log Retry events để dễ debug/demo khi Submission Service down
logging.level.io.github.resilience4j=INFO

# ══════════════════════════════════════════════════════
# TV2 — Resilience4j Configuration
# Pattern: Retry + Timeout cho SubmissionServiceClient
# ══════════════════════════════════════════════════════

# ── Retry: submissionService ──────────────────────────
# Statistics → Submission: retry 3 lần nếu Submission tạm thời chậm
resilience4j.retry.instances.submissionService.max-attempts=3
resilience4j.retry.instances.submissionService.wait-duration=2s
resilience4j.retry.instances.submissionService.enable-exponential-backoff=true
resilience4j.retry.instances.submissionService.exponential-backoff-multiplier=2
resilience4j.retry.instances.submissionService.retry-exceptions=java.lang.Exception

