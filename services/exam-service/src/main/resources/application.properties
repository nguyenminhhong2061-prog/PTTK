spring.application.name=exam-service
spring.docker.compose.enabled=false

# --- Server ---
server.port=8080

# --- Datasource (override via env in Docker/compose) ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:exam_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:verysecret}

# --- JPA/Hibernate ---
# NOTE: For production you typically use Flyway/Liquibase. For this assignment we follow the spec.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Hikari ---
# Avoid failing the container if MySQL becomes reachable a few seconds later.
spring.datasource.hikari.initialization-fail-timeout=60000

# --- Actuator ---
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
